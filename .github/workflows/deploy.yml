# GitHub Pages 一键部署
# - push 到 main：部署 web/ 目录（使用仓库内已有 job.json）
# - 每天 8:00（北京时间）：自动爬取 + 部署
# - Actions 页手动 Run workflow：爬取 + 部署（可分享公网链接）

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # UTC 0:00 = 北京时间 8:00
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      run_crawler:
        description: "运行爬虫更新数据后再部署"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: pip install -r requirements.txt

      - name: Run crawler
        if: |
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && inputs.run_crawler)
        run: python main.py
        continue-on-error: true

      - name: Ensure job.json exists
        run: |
          if [ ! -f web/job.json ]; then
            echo '{"last_updated":"","total":0,"new_today":0,"jobs":[]}' > web/job.json
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
