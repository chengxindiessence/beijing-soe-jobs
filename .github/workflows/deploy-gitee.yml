# Gitee Pages 部署（国内访问备用）
# 需在 GitHub Secrets 配置 GITEE_USERNAME、GITEE_TOKEN

name: Deploy to Gitee Pages

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "gitee-pages"
  cancel-in-progress: false

jobs:
  deploy-gitee:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure job.json exists
        run: test -f web/job.json || echo '{"last_updated":"","total":0,"new_today":0,"jobs":[]}' > web/job.json

      - name: Deploy to Gitee Pages
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          REPO_NAME: beijing-soe-jobs
        run: |
          if [ -z "$GITEE_USERNAME" ] || [ -z "$GITEE_TOKEN" ]; then
            echo "跳过：未配置 GITEE_USERNAME / GITEE_TOKEN"
            echo "运行 scripts/setup_gitee.sh 查看配置步骤"
            exit 0
          fi

          set -e
          REMOTE="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_USERNAME}/${REPO_NAME}.git"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/gitee-pages
          mkdir -p /tmp/gitee-pages
          cp -r web/* /tmp/gitee-pages/
          cd /tmp/gitee-pages

          git init -b pages
          git add -A
          git commit -m "deploy: $(date -u +%Y-%m-%dT%H:%MZ)"

          git push --force "$REMOTE" pages:pages
          echo "✓ 已推送到 Gitee Pages"
          echo "  https://${GITEE_USERNAME}.gitee.io/${REPO_NAME}/"
